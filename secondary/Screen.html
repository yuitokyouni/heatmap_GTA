<html lang="ja">

<head>

    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>ASTRO Secondary Screen</title>

    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,400&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --bg: #f4f6fa;
            --bg2: #fff;
            --bg3: #eaf0f7;
            --navy: #1A3260;
            --navy2: #2a4a7a;
            --navy-light: #C2D1EE;
            --teal: #4590B8;
            --ice: #DAE9F1;
            --warm: #D4883E;
            --tx: #1A3260;
            --tx2: #3d5a80;
            --tx3: #8596ad;
            --brd: rgba(26, 50, 96, .08);
            --font: 'DM Sans', system-ui, sans-serif;
            --mono: 'DM Mono', 'Courier New', monospace;
            --red: #c44e3f;
            --green: #3a8a5c;
        }

        body {
            background: var(--bg);
            color: var(--tx);
            font-family: var(--font);
            overflow: hidden;
            height: 100vh
        }

        /* Layout */
        .app {
            display: grid;
            grid-template-columns: 320px 1fr;
            height: 100vh
        }

        .sidebar {
            background: var(--bg2);
            border-right: 1px solid var(--brd);
            display: flex;
            flex-direction: column;
            overflow: hidden
        }

        .map-area {
            position: relative
        }

        /* Header */
        .s-header {
            padding: 20px 20px 12px;
            border-bottom: 1px solid var(--brd)
        }

        .s-header h1 {
            font-size: 15px;
            font-weight: 700;
            letter-spacing: -.3px;
            color: var(--navy)
        }

        .s-header h1 span {
            color: var(--teal)
        }

        .s-header .sub {
            font-size: 11px;
            color: var(--tx3);
            margin-top: 2px
        }

        .back-link {
            font-size: 11px;
            color: var(--teal);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-bottom: 8px
        }

        .back-link:hover {
            color: var(--navy)
        }

        /* Zone chips */
        .zone-chips {
            padding: 12px 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            border-bottom: 1px solid var(--brd)
        }

        .zone-chip {
            padding: 5px 11px;
            border-radius: 20px;
            font-size: 10.5px;
            font-weight: 500;
            border: 1px solid var(--brd);
            background: var(--bg);
            color: var(--tx2);
            cursor: pointer;
            transition: .15s;
            user-select: none;
        }

        .zone-chip:hover {
            border-color: var(--teal);
            color: var(--navy)
        }

        .zone-chip.on {
            background: var(--navy);
            border-color: var(--navy);
            color: #fff;
            font-weight: 600
        }

        .zone-chip .cnt {
            font-size: 9px;
            opacity: .65;
            margin-left: 2px
        }

        /* Municipality list */
        .muni-header {
            padding: 12px 20px 8px;
            font-size: 11px;
            font-weight: 600;
            color: var(--tx3);
            text-transform: uppercase;
            letter-spacing: .5px
        }

        .muni-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 12px 12px
        }

        .muni-list::-webkit-scrollbar {
            width: 4px
        }

        .muni-list::-webkit-scrollbar-thumb {
            background: var(--navy-light);
            border-radius: 2px
        }

        .muni-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: .12s;
            border: 1px solid transparent;
        }

        .muni-item:hover {
            background: var(--ice);
            border-color: var(--brd)
        }

        .muni-item.on {
            background: var(--navy-light);
            border-color: var(--teal)
        }

        .muni-rank {
            font-size: 10px;
            color: var(--tx3);
            font-weight: 500;
            width: 18px;
            text-align: right
        }

        .muni-name {
            font-size: 12.5px;
            font-weight: 600;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .muni-score {
            font-size: 11px;
            font-weight: 700;
            font-family: var(--mono);
            padding: 2px 8px;
            border-radius: 12px;
            min-width: 36px;
            text-align: center;
        }

        /* Score card */
        .score-card {
            border-top: 1px solid var(--brd);
            padding: 14px 20px;
            background: var(--bg)
        }

        .score-card h3 {
            font-size: 11px;
            font-weight: 600;
            color: var(--tx3);
            text-transform: uppercase;
            letter-spacing: .5px;
            margin-bottom: 8px
        }

        .sc-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px
        }

        .sc-item {
            background: var(--bg2);
            border: 1px solid var(--brd);
            border-radius: 6px;
            padding: 8px 10px;
            font-size: 10px;
        }

        .sc-item .sc-label {
            color: var(--tx3);
            margin-bottom: 2px
        }

        .sc-item .sc-value {
            font-size: 14px;
            font-weight: 700;
            font-family: var(--mono)
        }

        /* Layer controls on map */
        .layer-panel {
            position: absolute;
            top: 16px;
            right: 16px;
            z-index: 10;
            background: var(--bg2);
            border: 1px solid var(--brd);
            border-radius: 10px;
            padding: 12px;
            box-shadow: 0 4px 20px rgba(26, 50, 96, .1);
            min-width: 200px;
        }

        .layer-panel h3 {
            font-size: 10px;
            font-weight: 600;
            color: var(--tx3);
            text-transform: uppercase;
            letter-spacing: .6px;
            margin-bottom: 8px
        }

        .layer-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 0;
            font-size: 11.5px;
            color: var(--tx2);
            cursor: pointer;
            user-select: none;
        }

        .layer-item input {
            accent-color: var(--teal);
            margin: 0
        }

        .layer-item.disabled {
            opacity: .4;
            pointer-events: none
        }

        .layer-badge {
            font-size: 8px;
            padding: 1px 5px;
            border-radius: 8px;
            font-weight: 600;
            margin-left: auto
        }

        .layer-badge.ready {
            background: #d4edda;
            color: var(--green)
        }

        .layer-badge.pending {
            background: #ffeeba;
            color: #856404
        }

        /* Map info overlay */
        .map-info {
            position: absolute;
            bottom: 16px;
            left: 16px;
            z-index: 10;
            background: var(--bg2);
            border: 1px solid var(--brd);
            border-radius: 8px;
            padding: 10px 14px;
            box-shadow: 0 2px 12px rgba(26, 50, 96, .08);
            font-size: 11px;
            color: var(--tx2);
        }

        .map-info strong {
            color: var(--navy);
            font-weight: 600
        }

        /* Legend */
        .legend-panel {
            position: absolute;
            bottom: 16px;
            right: 16px;
            z-index: 10;
            background: var(--bg2);
            border: 1px solid var(--brd);
            border-radius: 8px;
            padding: 10px 14px;
            box-shadow: 0 2px 12px rgba(26, 50, 96, .08);
            font-size: 10px;
            color: var(--tx3);
            display: none;
        }

        .legend-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin: 3px 0
        }

        .legend-swatch {
            width: 14px;
            height: 14px;
            border-radius: 3px;
            border: 1px solid rgba(0, 0, 0, .08)
        }

        #map {
            width: 100%;
            height: 100%
        }

        /* Property markers */
        .prop-marker {
            width: 28px;
            height: 38px;
            cursor: pointer;
            position: relative
        }

        .prop-marker svg {
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, .3))
        }

        .prop-popup-card {
            font-family: 'DM Sans', sans-serif;
            font-size: 11px;
            color: #1A3260;
            min-width: 220px
        }

        .prop-popup-card h4 {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 2px
        }

        .prop-popup-card .pp-sub {
            font-size: 10px;
            color: #8596ad;
            margin-bottom: 8px
        }

        .prop-popup-card .pp-row {
            display: flex;
            justify-content: space-between;
            padding: 2px 0;
            border-bottom: 1px solid rgba(26, 50, 96, .06)
        }

        .prop-popup-card .pp-label {
            color: #8596ad
        }

        .prop-popup-card .pp-val {
            font-weight: 600
        }

        .prop-popup-card .pp-irr {
            font-size: 16px;
            font-weight: 700;
            color: #3a8a5c
        }
    </style>
</head>

        // Color ramp for scores
        function scoreColor(total) {
            if (total == null) return 'rgba(194,209,238,.35)';
            const t = Math.max(0, Math.min(1, (total - 30) / (97 - 30)));
            let r, g, b;
            if (t < 0.5) { const s = t * 2; r = Math.round(20 + s * (255 - 20)); g = Math.round(60 + s * (220 - 60)); b = Math.round(140 + s * (50 - 140)) }
            else { const s = (t - 0.5) * 2; r = Math.round(255 + s * (210 - 255)); g = Math.round(220 + s * (45 - 220)); b = Math.round(50 + s * (35 - 50)) }
            return `rgb(${r},${g},${b})`;
        }

        function selectZone(zid) {
            // Toggle
            if (activeZone === zid) {
                activeZone = null;
                activeMuni = null;
            } else {
                activeZone = zid;
                activeMuni = null;
            }

            // Update chips
            document.querySelectorAll('.zone-chip').forEach(c => {
                c.classList.toggle('on', c.dataset.zone === activeZone);
            });

            // Update map
            if (activeZone && ZONES[activeZone]) {
                const z = ZONES[activeZone];
                const b = z.bounds;
                map.fitBounds([[b.minLon, b.minLat], [b.maxLon, b.maxLat]], { padding: 40, duration: 800 });
                document.getElementById('map-info').innerHTML = '<strong>' + z.name + '</strong> — ' + z.count + ' municipalities';
            } else {
                map.flyTo({ center: [139.7, 35.7], zoom: 9, duration: 600 });
                document.getElementById('map-info').innerHTML = 'Select a zone to begin';
            }

            renderMuniList();
            updateScoreCard();
            // Try to load cached layer data for this zone
            tryLoadCachedLayers();
        }

        function selectMuni(code) {
            activeMuni = (activeMuni === code) ? null : code;

            // Highlight in list
            document.querySelectorAll('.muni-item').forEach(el => {
                el.classList.toggle('on', el.dataset.code === activeMuni);
            });

            // Zoom to municipality
            if (activeMuni && ZONES[activeZone]) {
                const m = ZONES[activeZone].municipalities.find(x => x.code === activeMuni);
                if (m && m.lat && m.lon) {
                    map.flyTo({ center: [m.lon, m.lat], zoom: 13, duration: 600 });
                }
            }

            updateScoreCard();
        }

        // ============================================================
        // Layer loading (from cache files)
        // ============================================================
        async function tryLoadCachedLayers() {
            if (!activeZone) return;

            // Non-tile layers: try zone-level merged files
            const simpleLayers = ['xkt003', 'xkt015', 'xkt006', 'xkt008', 'xkt009'];
            for (const code of simpleLayers) {
                const badge = document.getElementById('badge-' + code);
                const path = `cache/${code}/${activeZone}.json`;
                try {
                    const resp = await fetch(path);
                    if (!resp.ok) throw new Error('not found');
                    const data = await resp.json();
                    layerData[code] = data;
                    if (badge) { badge.textContent = 'ready'; badge.className = 'layer-badge ready' }
                } catch (e) {
                    console.log('LAYER LOAD FAIL:', code, e.message);
                    layerData[code] = null;
                    if (badge) { badge.textContent = 'pending'; badge.className = 'layer-badge pending' }
                }
            }

            // XKT013: tile-based loading
            await loadXKT013Tiles();
        }

        async function loadXKT013Tiles() {
            const badge = document.getElementById('badge-xkt013');
            try {
                const idxResp = await fetch('cache/xkt013/tile_index.json');
                if (!idxResp.ok) throw new Error('no index');
                const tileIndex = await idxResp.json();
                const tileNames = tileIndex[activeZone];
                if (!tileNames || tileNames.length === 0) throw new Error('no tiles for zone');

                if (badge) { badge.textContent = 'loading...'; badge.className = 'layer-badge pending' }
                const allFeatures = [];
                const batchSize = 20;
                for (let i = 0; i < tileNames.length; i += batchSize) {
                    const batch = tileNames.slice(i, i + batchSize);
                    const results = await Promise.all(batch.map(async name => {
                        try {
                            const r = await fetch(`cache/xkt013/${name}.json`);
                            if (!r.ok) return null;
                            const d = await r.json();
                            if (d?.type === 'FeatureCollection') return d.features.map(f => {
                                const p = f.properties, slim = {};
                                ['2020', '2025', '2030', '2035', '2040', '2045', '2050'].forEach(y => {
                                    ['PT01', 'PT02', 'PT23', 'PT24', 'PT25'].forEach(k => {
                                        const v = p[k + '_' + y]; if (v != null) slim[k + '_' + y] = v;
                                    });
                                });
                                return { type: 'Feature', geometry: f.geometry, properties: slim };
                            });
                            return null;
                        } catch (e) { return null }
                    }));
                    results.forEach(feats => { if (feats) allFeatures.push(...feats) });
                }

                layerData.xkt013 = { type: 'FeatureCollection', features: allFeatures };
                if (badge) { badge.textContent = `ready (${allFeatures.length})`; badge.className = 'layer-badge ready' }
                console.log(`XKT013: ${allFeatures.length} features loaded`);
            } catch (e) {
                layerData.xkt013 = null;
                if (badge) { badge.textContent = 'pending'; badge.className = 'layer-badge pending' }
            }
        }

            const sourceId = 'src-' + code;
            const layerId = 'lyr-' + code;

            if (!visible) {
                if (map.getLayer(layerId)) map.removeLayer(layerId);
                if (map.getSource(sourceId)) map.removeSource(sourceId);
                document.getElementById('legend-panel').style.display = 'none';
                return;
            }

            let data = layerData[code];
            if (!data || !data.features || data.features.length === 0) {
                alert('No data loaded for ' + code + '. Run fetch_reinfolib.py first.');
                return;
            }

            // Remove existing
            if (map.getLayer(layerId)) map.removeLayer(layerId);
            if (map.getSource(sourceId)) map.removeSource(sourceId);

            // Add source — for XKT013, compute colors first
            if (code === 'xkt013' && data.features) {
                data = {
                    type: 'FeatureCollection', features: data.features.map(f => {
                        const p = f.properties;
                        const pop2025 = p.PT02_2025 || p.PT01_2025;
                        const pop2035 = p.PT02_2035 || p.PT01_2035;
                        let change = null;
                        if (pop2025 > 0 && pop2035 != null) change = ((pop2035 / pop2025) - 1) * 100;
                        let color = 'rgba(200,200,200,0.1)';
                        if (change != null) {
                            const t = Math.max(0, Math.min(1, (change + 50) / 100));
                            if (t < 0.5) { const s = t * 2; color = `rgba(${180 + s * 20},${40 + s * 180},${40 + s * 180},0.65)` }
                            else { const s = (t - 0.5) * 2; color = `rgba(${220 - s * 180},${220},${220 - s * 180},0.65)` }
                        }
                        return { ...f, properties: { ...p, _change: change != null ? change : -999 } };
                    })
                };
            }
            map.addSource(sourceId, { type: 'geojson', data: data });

            // Determine geometry type from first feature
            const geomType = data.features[0]?.geometry?.type || 'Polygon';
            const style = LAYER_STYLES[code] || {};

            // XKT015: draw 1km radius circles around stations
            if (code === 'xkt015') {
                // Convert station lines to center points with 1km buffer circles
                var stationPoints = {
                    type: 'FeatureCollection', features: data.features.map(f => {
                        var coords = f.geometry.coordinates;
                        var center = f.geometry.type === 'LineString' ? coords[Math.floor(coords.length / 2)] :
                            f.geometry.type === 'Point' ? coords : [coords[0][0], coords[0][0]];
                        return { type: 'Feature', geometry: { type: 'Point', coordinates: center }, properties: f.properties };
                    })
                };
                if (map.getSource(sourceId)) map.removeSource(sourceId);
                map.addSource(sourceId, { type: 'geojson', data: stationPoints });
                map.addLayer({
                    id: layerId, type: 'circle', source: sourceId,
                    paint: {
                        'circle-radius': ['interpolate', ['linear'], ['zoom'], 8, 2, 12, 20, 14, 60, 16, 200],
                        'circle-color': 'rgba(26,50,96,0.12)',
                        'circle-stroke-width': 1.5,
                        'circle-stroke-color': 'rgba(26,50,96,0.3)'
                    }
                });
                return;
            }

            if (geomType === 'Point' || geomType === 'MultiPoint') {
                map.addLayer({
                    id: layerId, type: 'circle', source: sourceId,
                    paint: {
                        'circle-color': style.paint?.['circle-color'] || '#1A3260',
                        'circle-radius': style.paint?.['circle-radius'] || 4,
                        'circle-opacity': 0.8,
                        'circle-stroke-width': 1,
                        'circle-stroke-color': '#fff'
                    }
                });
            } else if (geomType === 'LineString' || geomType === 'MultiLineString') {
                map.addLayer({
                    id: layerId, type: 'line', source: sourceId,
                    paint: {
                        'line-color': style.paint?.['line-color'] || '#1A3260',
                        'line-width': 2,
                        'line-opacity': 0.7
                    }
                });
            } else {
                // Polygon
                if (code === 'xkt013') {
                    map.addLayer({
                        id: layerId, type: 'fill', source: sourceId,
                        paint: {
                            'fill-color': ['step', ['get', '_change'],
                                'rgba(0,0,0,0)', -998,
                                'rgb(40,40,40)', 0,
                                'rgb(180,230,190)', 5,
                                'rgb(150,200,140)', 20,
                                'rgb(100,190,100)'],
                            'fill-outline-color': ['step', ['get', '_change'],
                                'rgba(0,0,0,0)', 0,
                                'rgba(26,50,96,0.1)'],
                            'fill-opacity': ['step', ['get', '_change'],
                                0, -998,
                                0.15, 0,
                                0.3, 5,
                                0.4, 20,
                                0.55]
                        }
                    });
                } else {
                    map.addLayer({
                        id: layerId, type: 'fill', source: sourceId,
                        paint: style.paint || {
                            'fill-color': 'rgba(69,144,184,0.3)',
                            'fill-outline-color': 'rgba(26,50,96,0.3)'
                        }
                    });
                }
            }

            // Show legend for XKT003
            if (code === 'xkt003') {
                const lp = document.getElementById('legend-panel');
                lp.style.display = 'block';
                lp.innerHTML = `
      <div style="font-weight:600;margin-bottom:6px;color:var(--navy)">立地適正化計画</div>
      <div class="legend-row"><div class="legend-swatch" style="background:rgba(196,78,63,0.35)"></div>都市機能誘導区域</div>
      <div class="legend-row"><div class="legend-swatch" style="background:rgba(212,136,62,0.3)"></div>居住誘導区域</div>
      <div class="legend-row"><div class="legend-swatch" style="background:rgba(230,210,180,0.15)"></div>立地適正化計画区域</div>
    `;
            }

            // Popup on click
            map.on('click', layerId, (e) => {
                const props = e.features[0].properties;
                let html = '';

                if (code === 'xkt013') {
                    // Population popup — formatted
                    const pop2025 = props.PT02_2025 || props.PT01_2025;
                    const years = ['2025', '2030', '2035', '2040', '2045', '2050'];
                    const rows = years.map(y => {
                        const pop = props[`PT02_${y}`] || props[`PT01_${y}`];
                        if (pop == null) return '';
                        const change = pop2025 > 0 ? ((pop / pop2025 - 1) * 100).toFixed(1) : '—';
                        const changeColor = change > 0 ? '#3a8a5c' : change < -10 ? '#c44e3f' : '#8596ad';
                        return `<div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid rgba(26,50,96,.06)">
          <span style="color:#8596ad">${y}年</span>
          <span style="font-weight:500">${pop.toFixed(0)}人</span>
          <span style="font-weight:700;color:${changeColor}">${change > 0 ? '+' : ''}${change}%</span>
        </div>`;
                    }).join('');

                    html = `<div style="font-family:'DM Sans',sans-serif;font-size:11px;color:#1A3260;min-width:200px">
        <div style="font-weight:700;font-size:13px;margin-bottom:2px">250mメッシュ人口推計</div>
        <div style="font-size:10px;color:#8596ad;margin-bottom:8px">基準: 2025年 ${pop2025 ? pop2025.toFixed(0) + '人' : 'N/A'}</div>
        ${rows}
      </div>`;
                } else {
                    // Generic popup for other layers
                    const entries = Object.entries(props)
                        .filter(([k, v]) => v && !k.startsWith('_') && k !== 'tilequery')
                        .slice(0, 8)
                        .map(([k, v]) => `<div style="display:flex;justify-content:space-between;gap:12px;padding:2px 0"><span style="color:#8596ad">${k}</span><span style="font-weight:500">${v}</span></div>`)
                        .join('');
                    html = `<div style="font-family:'DM Sans',sans-serif;font-size:11px;color:#1A3260">${entries}</div>`;
                }

                new maplibregl.Popup({ maxWidth: '320px' })
                    .setLngLat(e.lngLat)
                    .setHTML(html)
                    .addTo(map);
            });
        }

        // Layer toggle handlers
        document.querySelectorAll('.layer-item input').forEach(cb => {
            cb.addEventListener('change', () => {
                const code = cb.closest('.layer-item').dataset.layer;
                toggleLayer(code, cb.checked);
            });
        });

        // ============================================================
        // Init
        // ============================================================
        map.on('load', () => {
            initZoneChips();
            renderMuniList();
            renderPropertyPins();
        });

        function renderPropertyPins() {
            // Remove existing
            propertyMarkers.forEach(m => m.remove());
            propertyMarkers = [];

            PROPERTIES.forEach(p => {
                // Create pin element
                const el = document.createElement('div');
                el.className = 'prop-marker';
                el.innerHTML = `<svg width="28" height="38" viewBox="0 0 28 38">
      <path d="M14 0C6.3 0 0 6.3 0 14c0 5.2 3 9.7 7 12.6L14 38l7-11.4c4-2.9 7-7.4 7-12.6C28 6.3 21.7 0 14 0z" fill="#1A3260"/>
      <circle cx="14" cy="13" r="5" fill="#fff"/>
      <text x="14" y="15" text-anchor="middle" fill="#1A3260" font-size="7" font-weight="700">A</text>
    </svg>`;

                const marker = new maplibregl.Marker({ element: el })
                    .setLngLat([p.lon, p.lat])
                    .setPopup(new maplibregl.Popup({ maxWidth: '300px', offset: 20 }).setHTML(
                        `<div class="prop-popup-card">
          <h4>${p.name}</h4>
          <div class="pp-sub">${p.ward} · ${p.station}駅 徒歩${p.walk_min}分 · ${p.year_built}年 ${p.structure}</div>
          <div class="pp-row"><span class="pp-label">IRR</span><span class="pp-irr">${p.irr_pct}%</span></div>
          <div class="pp-row"><span class="pp-label">Cap Rate</span><span class="pp-val">${p.cap_rate_pct}%</span></div>
          <div class="pp-row"><span class="pp-label">取得価格</span><span class="pp-val">¥${p.acq_price_m}M</span></div>
          <div class="pp-row"><span class="pp-label">戸数</span><span class="pp-val">${p.units}戸</span></div>
          <div class="pp-row"><span class="pp-label">延床面積</span><span class="pp-val">${p.gfa_sqm}㎡</span></div>
          <div class="pp-row"><span class="pp-label">平均賃料</span><span class="pp-val">¥${p.rent_avg_k}K/月</span></div>
          <div class="pp-row"><span class="pp-label">稼働率</span><span class="pp-val">${p.occupancy_pct}%</span></div>
        </div>`
                    ))
                    .addTo(map);

                propertyMarkers.push(marker);
            });
        }
    </script>
</body>

</html>
