<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ASTRO Heatmap 2026</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0b0d13;--bg2:#12141c;--bg3:#191c26;--bg4:#21242f;--tx:#e8e6df;--tx2:#9b9a94;--tx3:#6b6a66;--acc:#c97b3a;--acc2:#e8a04c;--brd:rgba(255,255,255,.06);--font:'Segoe UI',system-ui,sans-serif;--mono:'Courier New',monospace}
body{background:var(--bg);color:var(--tx);font-family:var(--font);overflow-x:hidden}
.dash{max-width:1320px;margin:0 auto;padding:20px}
.hdr{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:8px}
.hdr h1{font-size:20px;font-weight:700;letter-spacing:-.3px}
.hdr h1 span{color:var(--acc2)}
.hdr .sub{font-size:12px;color:var(--tx2);margin-top:2px}
.badge{background:rgba(201,123,58,.12);color:var(--acc2);font-size:10px;font-weight:700;padding:3px 10px;border-radius:16px;letter-spacing:.4px}
.top{display:grid;grid-template-columns:1fr 360px;gap:12px;margin-bottom:12px}
@media(max-width:900px){.top{grid-template-columns:1fr}}
.card{background:var(--bg2);border:1px solid var(--brd);border-radius:10px;overflow:hidden}
.card-h{padding:12px 16px 0;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.card-h h2{font-size:13px;font-weight:600}
.card-h .tag{font-size:10px;color:var(--tx3);background:var(--bg3);padding:2px 8px;border-radius:10px}
.card-b{padding:10px 16px 16px}
.flt{display:flex;gap:5px;flex-wrap:wrap;padding:8px 16px 0}
.flt button{background:var(--bg3);border:1px solid var(--brd);color:var(--tx2);font-size:11px;font-family:var(--font);padding:4px 10px;border-radius:16px;cursor:pointer;transition:.15s}
.flt button:hover{border-color:rgba(255,255,255,.15);color:var(--tx)}
.flt button.on{background:rgba(201,123,58,.12);border-color:var(--acc);color:var(--acc2)}
.mode-btns{display:flex;gap:2px;background:var(--bg3);border-radius:8px;padding:2px}
.mode-btns button{background:transparent;border:none;color:var(--tx3);font-size:11px;font-family:var(--font);padding:5px 14px;border-radius:6px;cursor:pointer;transition:.15s;font-weight:600}
.mode-btns button:hover{color:var(--tx)}
.mode-btns button.on{background:var(--bg);color:var(--tx);box-shadow:0 1px 3px rgba(0,0,0,.3)}
.map-wrap{position:relative;height:560px}
#mc{width:100%;height:100%;cursor:crosshair}
.legend{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--tx3);padding:6px 16px}
.lgb{display:flex;height:8px;border-radius:4px;overflow:hidden;width:140px}
.lgb span{flex:1}
.tt{position:fixed;pointer-events:none;background:var(--bg3);border:1px solid var(--brd);border-radius:8px;padding:10px 14px;font-size:12px;z-index:100;box-shadow:0 8px 32px rgba(0,0,0,.5);max-width:260px;opacity:0;transition:opacity .1s}
.tt.show{opacity:1}
.tt .tc{font-weight:700;font-size:13px;margin-bottom:2px}
.tt .tp{color:var(--tx3);font-size:10px;margin-bottom:6px}
.tt .tr{display:flex;justify-content:space-between;gap:14px;padding:2px 0}
.tt .tl{color:var(--tx3)}
.tt .tv{font-family:var(--mono);font-weight:600;font-size:11px}
.tt .tr.active-metric .tl{color:var(--acc2)}
.tt .tr.active-metric .tv{color:var(--acc2)}
.srch{position:relative;margin-bottom:8px}
.srch input{width:100%;background:var(--bg3);border:1px solid var(--brd);color:var(--tx);font-family:var(--font);font-size:11px;padding:6px 10px 6px 28px;border-radius:8px;outline:none}
.srch input:focus{border-color:var(--acc)}
.srch svg{position:absolute;left:8px;top:50%;transform:translateY(-50%);opacity:.4}
.rtbl{max-height:500px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--bg4) transparent}
.rtbl::-webkit-scrollbar{width:4px}
.rtbl::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}
.rtbl table{width:100%;border-collapse:collapse;font-size:11px}
.rtbl th{position:sticky;top:0;background:var(--bg2);color:var(--tx3);font-weight:500;text-align:left;padding:6px 8px;border-bottom:1px solid var(--brd);font-size:10px;text-transform:uppercase;letter-spacing:.4px;z-index:1;cursor:pointer;user-select:none}
.rtbl th:hover{color:var(--tx)}
.rtbl th.sorted{color:var(--acc2)}
.rtbl td{padding:5px 8px;border-bottom:1px solid var(--brd);color:var(--tx2);white-space:nowrap}
.rtbl tr:hover td{background:var(--bg3);color:var(--tx)}
.rtbl tr.hl td{background:rgba(201,123,58,.08)}
.rk{font-family:var(--mono);color:var(--tx3);font-size:10px}
.cn{color:var(--tx);font-weight:600}
.sb{display:inline-block;height:3px;border-radius:2px;margin-right:4px;vertical-align:middle}
.sp{display:inline-block;font-family:var(--mono);font-size:10px;font-weight:700;padding:1px 6px;border-radius:8px;min-width:32px;text-align:center}
.pb{display:inline-block;font-size:9px;padding:1px 5px;border-radius:6px;font-weight:600}
.bot{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:900px){.bot{grid-template-columns:1fr}}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:12px}
.met{background:var(--bg2);border:1px solid var(--brd);border-radius:8px;padding:10px 12px}
.met .ml{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px}
.met .mv{font-size:20px;font-weight:700;font-family:var(--mono)}
</style>
</head>

  let r,g,b;
  if(t<0.5){const s=t*2;r=Math.round(40+s*200);g=Math.round(60+s*180);b=Math.round(160-s*100)}
  else{const s=(t-0.5)*2;r=Math.round(240-s*30);g=Math.round(240-s*160);b=Math.round(60-s*40)}
  return`rgb(${r},${g},${b})`;
}
function sca(v,a,cfg){
  cfg=cfg||METRIC_CFG[metric];
  if(v==null)return`rgba(40,40,50,${a})`;
  const t=Math.max(0,Math.min(1,(v-cfg.min)/(cfg.max-cfg.min)));
  let r,g,b;
  if(t<0.5){const s=t*2;r=Math.round(40+s*200);g=Math.round(60+s*180);b=Math.round(160-s*100)}
  else{const s=(t-0.5)*2;r=Math.round(240-s*30);g=Math.round(240-s*160);b=Math.round(60-s*40)}
  return`rgba(${r},${g},${b},${a})`;
}

function getVal(d){
  const f=METRIC_CFG[metric].field;
  return d[f]!=null?d[f]:null;
}
function getValFromProps(p){
  const f=METRIC_CFG[metric].field;
  return p[f]!=null?p[f]:null;
}

// Metrics bar
function updateMetrics(){
  const cfg=METRIC_CFG[metric];

  const srt=[...DATA].filter(d=>getVal(d)!=null).sort((a,b)=>getVal(b)-getVal(a));
  const top=srt[0];
  const bot=srt[srt.length-1];
  document.getElementById('mets').innerHTML=
    `<div class="met"><div class="ml">Scored</div><div class="mv">${vals.length}<span style="font-size:12px;color:var(--tx3)"> / ${DATA.length}</span></div></div>`+
    `<div class="met"><div class="ml">Avg ${cfg.label}</div><div class="mv" style="color:${sc(+avg)}">${avg}</div></div>`+
    `<div class="met"><div class="ml">#1</div><div class="mv" style="color:var(--acc2);font-size:16px">${top.n}</div></div>`+
    `<div class="met"><div class="ml">Max</div><div class="mv" style="color:#5dca85">${getVal(top)}</div></div>`+
    `<div class="met"><div class="ml">Min</div><div class="mv" style="color:#e24b4a">${getVal(bot)}</div></div>`;
}

// Legend
function updateLegend(){

// MAP
const canvas=document.getElementById('mc');
const ctx=canvas.getContext('2d');
let W,H;
const B={minLat:34.95,maxLat:36.85,minLon:139.0,maxLon:140.9};
function px(lon){return((lon-B.minLon)/(B.maxLon-B.minLon))*W}
function py(lat){return((B.maxLat-lat)/(B.maxLat-B.minLat))*H}

let featurePaths=[];
function buildPaths(){
  featurePaths=[];
  for(const f of GEO.features){
    const code=f.properties.c;
    const val=getValFromProps(f.properties);
    const polys=[];
    const geom=f.geometry;
    const coordSets=geom.type==='Polygon'?[geom.coordinates]:geom.coordinates;
    for(const poly of coordSets){
      const rings=[];
      for(const ring of poly){rings.push(ring.map(p=>([px(p[0]),py(p[1])])))}
      polys.push(rings);
    }
    featurePaths.push({code,val,polys,props:f.properties});
  }
}

function drawMap(){
  const dpr=window.devicePixelRatio||1;
  const rect=canvas.parentElement.getBoundingClientRect();
  W=rect.width;H=rect.height;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,W,H);
  buildPaths();

  for(const fp of featurePaths){
    // Recompute val for current metric from score lookup
    const sd=SL[fp.code];
    const val=sd?getVal(sd):null;
    const isActive=!activePref||fp.props.p===activePref;
    const isHov=fp.code===hoveredCode;
    const isHl=fp.code===highlightCode;

    ctx.beginPath();
    for(const poly of fp.polys){
      for(const ring of poly){
        if(ring.length<3)continue;
        ctx.moveTo(ring[0][0],ring[0][1]);
        for(let i=1;i<ring.length;i++)ctx.lineTo(ring[i][0],ring[i][1]);
        ctx.closePath();
      }
    }

    if(!isActive){
      ctx.fillStyle='rgba(30,32,42,.6)';
      ctx.strokeStyle='rgba(255,255,255,.03)';ctx.lineWidth=0.3;
    }else{
      ctx.fillStyle=sc(val);
      ctx.strokeStyle=isHov||isHl?'#fff':'rgba(0,0,0,.4)';
      ctx.lineWidth=isHov||isHl?2:0.4;
    }
    ctx.fill();ctx.stroke();

    if(isHov&&isActive){
      let cx=0,cy=0,n=0;
      for(const poly of fp.polys)for(const ring of poly)for(const p of ring){cx+=p[0];cy+=p[1];n++}
      cx/=n;cy/=n;
      const name=fp.props.n;
      const valStr=val!=null?(' '+val):'';
      const label=name+valStr;
      ctx.font='bold 11px system-ui';
      const tw=ctx.measureText(label).width;
      ctx.fillStyle='rgba(0,0,0,.75)';
      ctx.fillRect(cx-tw/2-5,cy-9,tw+10,18);
      ctx.fillStyle='#fff';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(label,cx,cy);
      ctx.textAlign='start';ctx.textBaseline='alphabetic';
    }
  }
}

function hitTest(mx,my){
  for(let i=featurePaths.length-1;i>=0;i--){
    const fp=featurePaths[i];
    for(const poly of fp.polys){if(pip(mx,my,poly[0]))return fp}
  }
  return null;
}
function pip(x,y,ring){
  let inside=false;
  for(let i=0,j=ring.length-1;i<ring.length;j=i++){
    const xi=ring[i][0],yi=ring[i][1],xj=ring[j][0],yj=ring[j][1];
    if(((yi>y)!==(yj>y))&&(x<(xj-xi)*(y-yi)/(yj-yi)+xi))inside=!inside;
  }
  return inside;
}

function showTT(d,x,y){
  const sd=SL[d.code]||{};
  const cfg=METRIC_CFG[metric];
  const curVal=sd[cfg.field];
  tt.innerHTML=`<div class="tc">${d.props.n}</div><div class="tp">${PF[d.props.p]||d.props.p}${d.props.e?' · '+d.props.e:''}</div>`+
    `<div class="tr${metric==='to'?' active-metric':''}"><span class="tl">Total</span><span class="tv" style="color:${metric==='to'?sc(sd.to,METRIC_CFG.to):''}">${sd.to!=null?sd.to:'—'}</span></div>`+
    `<div class="tr${metric==='m'?' active-metric':''}"><span class="tl">Macro</span><span class="tv" style="color:${metric==='m'?sc(sd.m,METRIC_CFG.m):''}">${sd.m!=null?sd.m+'/50':'—'}</span></div>`+
    `<div class="tr${metric==='tr'?' active-metric':''}"><span class="tl">Station</span><span class="tv" style="color:${metric==='tr'?sc(sd.tr,METRIC_CFG.tr):''}">${sd.tr!=null?sd.tr+'/50':'—'}</span></div>`;
  tt.style.left=Math.min(x+14,window.innerWidth-270)+'px';
  tt.style.top=(y-10)+'px';
  tt.classList.add('show');
}

canvas.addEventListener('mousemove',e=>{
  const rect=canvas.getBoundingClientRect();
  const hit=hitTest(e.clientX-rect.left,e.clientY-rect.top);
  const nc=hit?hit.code:null;
  if(nc!==hoveredCode){hoveredCode=nc;drawMap()}
  if(hit)showTT(hit,e.clientX,e.clientY);else tt.classList.remove('show');
});
canvas.addEventListener('mouseleave',()=>{hoveredCode=null;drawMap();tt.classList.remove('show')});
canvas.addEventListener('click',e=>{
  const rect=canvas.getBoundingClientRect();
  const hit=hitTest(e.clientX-rect.left,e.clientY-rect.top);
  highlightCode=hit?hit.code:null;drawMap();
  if(hit){
    const row=document.querySelector(`tr[data-c="${hit.code}"]`);
    if(row){row.scrollIntoView({block:'center',behavior:'smooth'});
      document.querySelectorAll('.rtbl tr.hl').forEach(r=>r.classList.remove('hl'));row.classList.add('hl')}
  }
});
window.addEventListener('resize',drawMap);

// RANKING
let rankSort='metric'; // 'metric' sorts by current metric
function renderRanking(q=''){
  const ql=q.toLowerCase();
  const cfg=METRIC_CFG[metric];
  let list=[...DATA].filter(d=>getVal(d)!=null).sort((a,b)=>getVal(b)-getVal(a));
  // Append nulls at end
  const nulls=DATA.filter(d=>getVal(d)==null);
  list=list.concat(nulls);
  if(activePref)list=list.filter(d=>d.p===activePref);
  if(ql)list=list.filter(d=>d.n.includes(ql)||(d.e&&d.e.toLowerCase().includes(ql)));
  document.getElementById('rc').textContent=list.length;

  const sortLabel={to:'Total',m:'Macro',tr:'Station'}[metric];
  const html='<table><thead><tr><th>#</th><th>Municipality</th><th class="sorted">'+sortLabel+'</th><th>M</th><th>S</th></tr></thead><tbody>'+
    list.map((d,i)=>{
      const bg=PC[d.p]||'#666';
      const val=getVal(d);
      const maxR=cfg.maxR;
      return`<tr data-c="${d.c}" onmouseenter="hoveredCode='${d.c}';drawMap()" onmouseleave="hoveredCode=null;drawMap()">
        <td class="rk">${val!=null?i+1:'—'}</td>
        <td><span class="cn">${d.n}</span> <span class="pb" style="background:${bg}22;color:${bg}">${PF[d.p]||d.p}</span></td>
        <td><span class="sb" style="width:${val!=null?val/maxR*36:0}px;background:${sc(val)}"></span><span class="sp" style="background:${sca(val,.15)};color:${sc(val)}">${val!=null?val:'—'}</span></td>
        <td style="font-family:var(--mono);font-size:10px">${d.m}</td>
        <td style="font-family:var(--mono);font-size:10px">${d.tr!=null?d.tr:'—'}</td>
      </tr>`}).join('')+'</tbody></table>';
  document.getElementById('rtbl').innerHTML=html;
}
document.getElementById('sq').addEventListener('input',e=>renderRanking(e.target.value));

new Chart(document.getElementById('scc'),{

      y:{title:{display:true,text:'Station',color:'#6b6a66',font:{size:10}},grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#6b6a66',font:{size:9}},min:0,max:55}
    },
    plugins:{legend:{position:'top',labels:{boxWidth:8,padding:10,color:'#9b9a94',font:{size:10}}},
      tooltip:{callbacks:{label:c=>`${c.raw.label}: M=${c.raw.x} S=${c.raw.y}`}}
    }
  }
});

// HISTOGRAM
let histChart=null;
function updateHistogram(){
  const cfg=METRIC_CFG[metric];
  const vals=DATA.map(d=>getVal(d)).filter(v=>v!=null);
  const nBins=10;
  const range=cfg.max-cfg.min;
  const bins=Array(nBins).fill(0);
  vals.forEach(v=>{const i=Math.min(nBins-1,Math.floor((v-cfg.min)/range*nBins));bins[i]++});
  const labels=bins.map((_,i)=>{const lo=Math.round(cfg.min+i*range/nBins);const hi=Math.round(cfg.min+(i+1)*range/nBins);return`${lo}–${hi}`});
  const colors=bins.map((_,i)=>sc(cfg.min+i*range/nBins+(range/nBins/2)));

  if(histChart){histChart.destroy()}
  histChart=new Chart(document.getElementById('hsc'),{
    type:'bar',
    data:{labels,datasets:[{data:bins,backgroundColor:colors,borderWidth:0,borderRadius:3}]},
    options:{responsive:true,maintainAspectRatio:false,
      scales:{
        x:{grid:{display:false},ticks:{color:'#6b6a66',font:{size:9}},title:{display:true,text:cfg.label,color:'#6b6a66',font:{size:10}}},
        y:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#6b6a66',font:{size:9}},title:{display:true,text:'Count',color:'#6b6a66',font:{size:10}}}
      },
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.raw} municipalities`}}}
    }
  });
}

updateMetrics();

updateHistogram();
